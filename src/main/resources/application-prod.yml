# =====================================================================
# Consolidated Endpoint Services - production profile
# Sensitive values are injected via environment variables.
# =====================================================================

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: endpoint-services

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      pool-name: EndpointServicesHikariPool
      minimum-idle: 5
      maximum-pool-size: 30
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      auto-commit: true

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 100
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}

security:
  filter:
    enabled: true
    token:
      header: Authorization
      prefix: Bearer

# Still consumed independently by com.core.service.security.SecurityService;
# token.prefix intentionally omitted so the default "Bearer " (with trailing
# space) is used, matching the original core SecurityService behaviour.

# Inter-module calls default to this same application; override per environment.
service:
  authen:
    url: ${SERVICE_AUTHEN_URL:http://localhost:8080/endpoint-authen-service}
  master:
    url: ${SERVICE_MASTER_URL:http://localhost:8080/endpoint-master-service}
  core:
    url: ${SERVICE_CORE_URL:http://localhost:8080/endpoint-core-service}

search:
  default-page-size: 20
  max-page-size: 100
  enable-fuzzy-search: true
  min-search-length: 2

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    disable-swagger-default-url: true

logging:
  level:
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
